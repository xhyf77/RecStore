site_name: RecStore Documentation
site_description: RecStore is a high-performance, distributed parameter server system designed for machine learning applications.
site_author: RecStore Team
site_url: https://RecStore.github.io/RecStore/
repo_url: https://github.com/RecStore/RecStore
repo_name: RecStore
edit_uri: 'https://github.com/RecStore/RecStore/edit/main/docs'

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  font:
    text: 'Fira Sans'
    code: 'Fira Mono'

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页:
    - 介绍: index.md
    - 快速开始:
      - 搭建指南: quickstart.md
      - 快速运行: quickrun.md
      - 常见问题: faq.md
  - 配置:
      - 项目配置: config.md
  - 架构:
    - 总览: architecture/overview.md
    - 计算层:
      - 架构总览: calc/index.md
      - CommonOp 接口: calc/op_interface.md
      - KVClient 客户端: calc/kvclient.md
      - PyTorch C++ 扩展: calc/pytorch_binding.md
      - EmbeddingBag 模块: calc/embedding_modules.md
      - 优化器与梯度更新: calc/optimizer.md
    - 参数服务器:
      - 总览: parameter_server/index.md
      - 基础抽象: parameter_server/base.md
      - gRPC 实现: parameter_server/grpc.md
      - bRPC 实现: parameter_server/brpc.md
      - 协议定义: parameter_server/proto.md
      - RDMA 模块: parameter_server/rdma.md
    - 存储层:
      - 架构总览: storage/index.md
      - CachePS 层: storage/cacheps.md
      - BaseKV 抽象: storage/basekv.md
      - KV 引擎实现: storage/kv_engines.md
      - 内存管理: storage/memory.md
  - 开发:
    - 性能分析:
      - 端到端性能: dev/performance.md
      - 存储端性能: dev/ycsb.md
    - 免配置运行: dev/zero_config_run.md
    - 功能实现:
      - 添加算子: dev/feature/add_operator.md
      - 分布式训练: dev/distributed.md
    - 测试文档:
      - 概览: dev/testing.md
      - 辅助工具: dev/tests/tools.md
      - Python客户端: dev/tests/client_test.md
      - EBC精度对齐: dev/tests/ebc_precision.md
      - DistEmbedding: dev/tests/dist_emb_test.md
      - 覆盖率: dev/tests/coverage.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RecStore/RecStore
