name: Format

on:
  pull_request:
    paths:
      - 'src/**/*.cc'
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - '.clang-format'
      - '.githooks/pre-commit'
      - 'ci/format/clang_format.sh'
      - '.github/workflows/format.yml'
  push:
    paths:
      - 'src/**/*.cc'
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - '.clang-format'
      - '.githooks/pre-commit'
      - 'ci/format/clang_format.sh'
      - '.github/workflows/format.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    name: Run clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install clang-format
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        env:
          FORMAT_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: ci/format/clang_format.sh --check --changed
