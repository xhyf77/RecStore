name: Deploy Docs

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/doc-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-git-revision-date-localized-plugin

      - name: Prepare Documentation
        run: |
          cp README.md docs/index.md
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_OWNER="${{ github.repository_owner }}"
          SITE_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo "Setting site_url to ${SITE_URL}"
          sed -i "s|^site_url:.*|site_url: ${SITE_URL}|" mkdocs.yml

      - name: Build with MkDocs
        run: mkdocs build

      - name: Deploy documentation to gh-pages
        run: |
          bash ci/pages/update_gh_pages.sh \
            --source ./site \
            --mode docs \
            --message "docs: deploy documentation"
